<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#061528" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="assets/icon.svg" />
<title>ZOZ External Brain</title>
<style>
:root{--bg:#020712;--panel:#071628;--line:#214b70;--text:#eaf7ff;--muted:#8fb0c7;--cyan:#55e4ff;--gold:#ffbe55;--violet:#bd85ff;--green:#62ffc4;--red:#ff7373}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}body{background:radial-gradient(circle at 50% 0,#153b6e 0,#061426 34%,#020712 78%)}button,input,select{font:inherit}.app{height:100%;display:grid;grid-template-rows:auto 1fr}.top{padding:12px 12px 8px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start;background:linear-gradient(180deg,#06192dcc,#06142655);border-bottom:1px solid #173957}.kicker{font-size:10px;color:#81e7ff;letter-spacing:.24em;text-transform:uppercase;font-weight:900}.title{font-size:clamp(30px,7vw,64px);line-height:.92;margin:4px 0;text-shadow:0 0 30px #43dfff77}.sub{font-size:13px;color:#9cb8ca;max-width:760px}.install{border:1px solid #3aa7d7;background:#071b31;color:#eaffff;border-radius:16px;padding:11px 14px;font-weight:900}.hidden{display:none}.toolbar{grid-column:1/-1;display:grid;grid-template-columns:minmax(0,1fr) 160px auto auto auto;gap:8px;margin-top:8px}.toolbar input,.toolbar select{border:1px solid #245b82;background:#061424;color:#eaf7ff;border-radius:14px;padding:12px;outline:none}.btn{border:1px solid #2e7dab;background:#071a30;color:#ddf7ff;border-radius:14px;padding:11px 13px;font-weight:900}.stage{position:relative;overflow:hidden}.graphWrap{position:absolute;inset:0;background:radial-gradient(circle at 50% 48%,#1abfff14,transparent 34%),radial-gradient(circle at 74% 28%,#ffb84d12,transparent 18%),radial-gradient(circle at 26% 68%,#3fffbd11,transparent 20%)}.graphWrap:before{content:"";position:absolute;inset:0;background-image:radial-gradient(#5adfff44 1px,transparent 1px);background-size:28px 28px;opacity:.12}.graph{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}.graph.grabbing{cursor:grabbing}.edge{fill:none;stroke:#5fdfff;stroke-width:1.35;opacity:.28}.edge.active{opacity:.95;stroke-width:3;filter:drop-shadow(0 0 8px #5fdfff)}.edge.dash{stroke-dasharray:8 12;animation:dash 18s linear infinite}@keyframes dash{to{stroke-dashoffset:-420}}.node{cursor:pointer}.node .halo{fill:transparent;stroke:transparent;stroke-width:20}.node .body{stroke-width:2.4;filter:drop-shadow(0 0 14px #35dfff55)}.node text{pointer-events:none;text-anchor:middle;fill:#ecfbff;font-weight:900}.node .id{fill:#84ecff;font-size:12px;letter-spacing:.08em}.node .name{font-size:15px}.node .status{fill:#b8d1e2;font-size:11px;font-weight:700}.node.dim{opacity:.22}.node.active .body{stroke:#fff;stroke-width:4;filter:drop-shadow(0 0 20px #fff) drop-shadow(0 0 35px #5fdfff)}.coreShape{filter:drop-shadow(0 0 18px #55e4ff) drop-shadow(0 0 48px #1c8fff)}.coreText{font-size:28px;fill:#fff;font-weight:950}.coreSmall{fill:#bfefff;font-size:13px;font-weight:750}.areaLabel{fill:#a5c6d8;font-size:13px;font-weight:800;letter-spacing:.08em;text-anchor:middle}.zoomBar{position:absolute;right:12px;top:12px;display:grid;gap:8px;z-index:5}.zoomBar button{width:42px;height:42px;border-radius:14px;border:1px solid #337daa;background:#07192e;color:#eaffff;font-size:22px;font-weight:900}.sheet{position:fixed;left:0;right:0;bottom:0;z-index:10;background:linear-gradient(180deg,#0a1b31,#030914);border-top:1px solid #2c6b93;border-radius:24px 24px 0 0;box-shadow:0 -12px 60px #000b;max-height:72vh;transform:translateY(calc(100% - 62px));transition:.22s ease;padding:10px 14px 18px}.sheet.open{transform:translateY(0)}.handle{width:54px;height:5px;border-radius:999px;background:#3d6d8a;margin:0 auto 10px}.sheetTop{display:flex;align-items:center;justify-content:space-between;gap:10px}.sheet h2{margin:4px 0 8px;font-size:26px;line-height:1.02}.close{border:1px solid #315c79;background:#071525;color:#dff7ff;border-radius:12px;padding:8px 10px;font-weight:900}.pill{display:inline-block;margin:3px 5px 3px 0;border:1px solid #33769d;background:#07192c;color:#bdf1ff;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:850}.sheetBody{overflow:auto;max-height:55vh;padding-right:2px}.kv{border-top:1px solid #173c5a;padding-top:10px;margin-top:10px;color:#c8deeb}.kv b{display:block;color:#7de6ff;font-size:11px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}.links{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-top:10px}.linkBtn{display:block;text-decoration:none;text-align:center;border:1px solid #3aa7d7;background:#08213a;color:#eaffff;border-radius:14px;padding:10px;font-weight:900}.copy{border:1px solid #496b87;background:#07192c;color:#eaffff;border-radius:14px;padding:10px;font-weight:900}.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#0a2036;border:1px solid #55e4ff;color:#eaffff;padding:10px 14px;border-radius:999px;z-index:20;opacity:0;transition:.2s}.toast.show{opacity:1}.empty{fill:#9bb5c8;text-anchor:middle;font-size:18px}.mini{display:none}@media(max-width:760px){.top{grid-template-columns:1fr auto;padding:10px}.sub{display:none}.title{font-size:36px}.toolbar{grid-template-columns:1fr 112px 44px 44px;gap:7px}.toolbar select{grid-column:1/3}.toolbar .reset{grid-column:3/5}.toolbar input,.toolbar select,.btn{padding:10px}.wideBtn{display:none}.graphWrap{top:0}.sheet{transform:translateY(calc(100% - 58px));padding:9px 12px 16px}.sheet h2{font-size:23px}.zoomBar{right:9px;top:9px}.zoomBar button{width:39px;height:39px}.mini{display:inline}}
</style>
</head>
<body>
<div class="app">
<header class="top">
  <div><div class="kicker">OlegGPT Control Map</div><div class="title">ZOZ External Brain</div><div class="sub">Obsidian-style graph: мозг в центре, живые связи, drag/zoom, node details и реальные ссылки на файлы.</div></div>
  <button id="install" class="install hidden">Install</button>
  <div class="toolbar">
    <input id="search" placeholder="Search nodes: bootstrap, FD QA, app…" />
    <select id="area"><option value="all">All areas</option></select>
    <button class="btn mini" id="zoomInMini">+</button>
    <button class="btn mini" id="zoomOutMini">−</button>
    <button class="btn reset" id="resetView">Center</button>
  </div>
</header>
<main class="stage">
  <div class="graphWrap">
    <svg id="graph" class="graph" viewBox="0 0 1000 760" aria-label="ZOZ External Brain graph">
      <defs>
        <radialGradient id="brainGrad" cx="50%" cy="42%" r="70%"><stop offset="0" stop-color="#b7ffff"/><stop offset=".35" stop-color="#208cff"/><stop offset="1" stop-color="#082747"/></radialGradient>
        <radialGradient id="nodeGrad" cx="40%" cy="30%" r="70%"><stop offset="0" stop-color="#123a62"/><stop offset="1" stop-color="#061525"/></radialGradient>
      </defs>
      <g id="viewport"><g id="edges"></g><g id="labels"></g><g id="nodes"></g></g>
    </svg>
    <div class="zoomBar"><button id="zoomIn">+</button><button id="zoomOut">−</button><button id="home">⌂</button></div>
  </div>
</main>
</div>
<section id="sheet" class="sheet open">
  <div class="handle"></div>
  <div class="sheetTop"><div class="kicker">Selected Node</div><button class="close" id="sheetToggle">Hide</button></div>
  <div id="sheetContent" class="sheetBody"></div>
</section>
<div id="toast" class="toast">Copied</div>
<script>
const LINKS={bootstrap:'https://docs.google.com/document/d/1oh9Rhr9pcFXWsG4sXkqd8uXcRo-1W47j1M03pJcYxI8/edit',index:'https://docs.google.com/spreadsheets/d/1XSvHsfn2MqH125-EnP6vDtj5Tm3hrYUXxulwFkRQ5pI/edit',repo:'https://github.com/zozmanz-creator/zoz-external-brain-app',live:'https://zozmanz-creator.github.io/zoz-external-brain-app/',check:'https://github.com/zozmanz-creator/check-your-report'};
const nodes=[
{id:'CORE',title:'ZOZ External Brain',area:'Core',type:'Brain Hub',status:'Active',source:'External Brain structure',confidence:'CONFIRMED_SOURCE',next:'Open Bootstrap, then Live Index, then relevant Node ID.',x:500,y:370,r:88,core:true,links:[['Open Bootstrap',LINKS.bootstrap],['Open Live Index',LINKS.index],['Open GitHub Repo',LINKS.repo],['Open Live App',LINKS.live]]},
{id:'00_BOOTSTRAP',title:'Bootstrap',area:'System',type:'Google Doc',status:'Source of Truth',source:'GPT_ZOZ_Bootstrap',confidence:'CONFIRMED_SOURCE',next:'Use as entry constitution before serious External Brain work.',x:500,y:120,r:48,color:'#55e4ff',links:[['Open Bootstrap',LINKS.bootstrap]]},
{id:'02_INDEX_AND_LINK_MAPS',title:'Live Memory Index',area:'System',type:'Google Sheet',status:'Active',source:'GPT_ZOZ_Live_Memory_Index',confidence:'CONFIRMED_SOURCE',next:'Use for Node IDs, Link IDs, Sources, Confidence, Status, Next Action.',x:760,y:205,r:54,color:'#55e4ff',links:[['Open Live Index',LINKS.index],['Open Bootstrap',LINKS.bootstrap]]},
{id:'03_ACTIVE_PROJECTS',title:'Active Projects',area:'Projects',type:'Domain',status:'Active',source:'External Brain map',confidence:'CONFIRMED_SOURCE',next:'Route FD QA Engine and ZOZ app work here.',x:820,y:430,r:52,color:'#62ffc4',links:[['Open Live Index',LINKS.index],['Open ZOZ App Repo',LINKS.repo]]},
{id:'ZOZ-FD-0001',title:'FD QA Engine',area:'Fire Door QA',type:'Protected Expert Logic',status:'Active',source:'Oleg project context',confidence:'USER_CONFIRMED',next:'Keep internal rule engine protected; public app separate.',x:685,y:640,r:56,color:'#ffbe55',links:[['Open Product Repo',LINKS.check],['Open Live Index',LINKS.index]]},
{id:'05_KNOWLEDGE_BASE',title:'Knowledge Base',area:'Knowledge',type:'Domain',status:'Active',source:'External Brain map',confidence:'CONFIRMED_SOURCE',next:'Store reusable FD rules, prompts, methods and references.',x:320,y:640,r:52,color:'#55e4ff',links:[['Open Live Index',LINKS.index],['Open Bootstrap',LINKS.bootstrap]]},
{id:'06_EVIDENCE_ARCHIVE',title:'Evidence Archive',area:'Evidence',type:'Domain',status:'Active',source:'External Brain map',confidence:'CONFIRMED_SOURCE',next:'PDFs, screenshots, reports, job sheets and source evidence.',x:180,y:430,r:52,color:'#bd85ff',links:[['Open Live Index',LINKS.index]]},
{id:'07_AUTOMATION_LOGS',title:'Automation Logs',area:'Automation',type:'Domain',status:'Watch',source:'External Brain map',confidence:'CONFIRMED_SOURCE',next:'Track ChatGPT actions, Drive changes, GitHub changes and deployments.',x:240,y:205,r:52,color:'#bd85ff',links:[['Open App Repo',LINKS.repo]]},
{id:'08_OUTPUTS',title:'Outputs',area:'Outputs',type:'Domain',status:'Active',source:'External Brain map',confidence:'CONFIRMED_SOURCE',next:'Generated Excel, PDF, diagrams, presentations and dashboards.',x:500,y:610,r:48,color:'#62ffc4',links:[['Open Live Index',LINKS.index],['Open Live App',LINKS.live]]},
{id:'09_VISUAL_MAPS',title:'Visual Maps',area:'Visual',type:'Domain',status:'Active',source:'External Brain visual map',confidence:'CONFIRMED_SOURCE',next:'System diagrams, Miro boards and visual dashboards.',x:500,y:255,r:46,color:'#55e4ff',links:[['Open Live App',LINKS.live],['Open GitHub Repo',LINKS.repo]]},
{id:'ZOZ-APP-0001',title:'External Brain App',area:'App',type:'PWA',status:'V4 Build',source:'GitHub Pages',confidence:'CONFIRMED_SOURCE',next:'Improve graph data sync from Live Memory Index.',x:635,y:330,r:48,color:'#62ffc4',links:[['Open Live App',LINKS.live],['Open GitHub Repo',LINKS.repo]]},
{id:'ZOZ-SYS-0012',title:'Capture Rule',area:'System',type:'Rule',status:'Active',source:'Oleg instruction',confidence:'USER_CONFIRMED',next:'Suggest saving reusable ideas, rules, templates and repeated pain points.',x:365,y:330,r:46,color:'#55e4ff',links:[['Open Bootstrap',LINKS.bootstrap],['Open Live Index',LINKS.index]]}
];
const edges=[['CORE','00_BOOTSTRAP'],['CORE','02_INDEX_AND_LINK_MAPS'],['CORE','03_ACTIVE_PROJECTS'],['CORE','05_KNOWLEDGE_BASE'],['CORE','06_EVIDENCE_ARCHIVE'],['CORE','07_AUTOMATION_LOGS'],['CORE','08_OUTPUTS'],['CORE','09_VISUAL_MAPS'],['03_ACTIVE_PROJECTS','ZOZ-FD-0001'],['03_ACTIVE_PROJECTS','ZOZ-APP-0001'],['09_VISUAL_MAPS','ZOZ-APP-0001'],['07_AUTOMATION_LOGS','ZOZ-APP-0001'],['00_BOOTSTRAP','ZOZ-SYS-0012'],['02_INDEX_AND_LINK_MAPS','ZOZ-SYS-0012'],['05_KNOWLEDGE_BASE','ZOZ-FD-0001']];
let selected='CORE',scale=1,pan={x:0,y:0},drag=false,last=null,moved=false,deferred=null;const $=s=>document.querySelector(s),svgNS='http://www.w3.org/2000/svg';
function el(tag,attrs={}){const e=document.createElementNS(svgNS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e}function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function byId(id){return nodes.find(n=>n.id===id)}function neighbours(id){return new Set(edges.filter(e=>e.includes(id)).flat())}function visibleNodes(){const q=$('#search').value.toLowerCase(),a=$('#area').value;return new Set(nodes.filter(n=>(a==='all'||n.area===a||n.id==='CORE')&&[n.id,n.title,n.area,n.type,n.status].join(' ').toLowerCase().includes(q)).map(n=>n.id).concat('CORE'))}
function draw(){const vis=visibleNodes(),near=neighbours(selected);$('#edges').innerHTML='';$('#labels').innerHTML='';$('#nodes').innerHTML='';edges.forEach(([a,b],i)=>{if(!vis.has(a)||!vis.has(b))return;const A=byId(a),B=byId(b),mx=(A.x+B.x)/2,my=(A.y+B.y)/2-40;const p=`M${A.x},${A.y} Q${mx},${my} ${B.x},${B.y}`;$('#edges').append(el('path',{d:p,class:'edge dash '+(a===selected||b===selected?'active':'')}))});const areas=[['SYSTEM',500,55],['PROJECTS',850,380],['KNOWLEDGE',230,650],['EVIDENCE',120,380]];areas.forEach(([t,x,y])=>{const tx=el('text',{x,y,class:'areaLabel'});tx.textContent=t;$('#labels').append(tx)});nodes.forEach(n=>{if(!vis.has(n.id))return;$('#nodes').append(drawNode(n,near))});renderSheet()}
function drawNode(n,near){const g=el('g',{class:`node ${selected===n.id?'active':''} ${selected!=='CORE'&&!near.has(n.id)?'dim':''}`,transform:`translate(${n.x} ${n.y})`});g.dataset.id=n.id;g.addEventListener('pointerdown',e=>e.stopPropagation());g.addEventListener('click',e=>{e.stopPropagation();selected=n.id;openSheet();draw()});if(n.core){g.append(el('path',{class:'coreShape',d:'M-105,-10 C-132,-42 -104,-86 -58,-76 C-42,-121 22,-112 35,-72 C73,-111 135,-77 120,-27 C162,-4 142,61 89,63 C63,103 -7,101 -26,68 C-64,89 -121,54 -105,-10',fill:'url(#brainGrad)',stroke:'#7cf1ff','stroke-width':4}));let t=el('text',{y:8,class:'coreText'});t.textContent='ZOZ';g.append(t);let s=el('text',{y:31,class:'coreSmall'});s.textContent='External Brain';g.append(s);return g}g.append(el('circle',{class:'halo',r:n.r+14}));g.append(el('circle',{class:'body',r:n.r,fill:'url(#nodeGrad)',stroke:n.color||'#55e4ff'}));let id=el('text',{class:'id',y:-18});id.textContent=n.id.length>19?n.id.slice(0,18)+'…':n.id;g.append(id);let words=n.title.split(' ');let line1=words.slice(0,2).join(' '),line2=words.slice(2,5).join(' ');let l1=el('text',{class:'name',y:4});l1.textContent=line1;g.append(l1);let l2=el('text',{class:'status',y:24});l2.textContent=line2||n.status;g.append(l2);return g}
function renderSheet(){const n=byId(selected)||nodes[0];const links=(n.links||[]).map(([label,url])=>`<a class="linkBtn" href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>`).join('');$('#sheetContent').innerHTML=`<h2>${esc(n.title)}</h2><span class="pill">${esc(n.id)}</span><span class="pill">${esc(n.area)}</span><span class="pill">${esc(n.status)}</span><div class="kv"><b>Type</b>${esc(n.type)}</div><div class="kv"><b>Source</b>${esc(n.source)}</div><div class="kv"><b>Confidence</b>${esc(n.confidence)}</div><div class="kv"><b>Next Action</b>${esc(n.next)}</div><div class="kv"><b>Linked files</b><div class="links">${links}<button class="copy" onclick="copyNode('${esc(n.id)}')">Copy Node ID</button></div></div>`}
function openSheet(){$('#sheet').classList.add('open');$('#sheetToggle').textContent='Hide'}function toggleSheet(){const s=$('#sheet');s.classList.toggle('open');$('#sheetToggle').textContent=s.classList.contains('open')?'Hide':'Show'}function applyTransform(){$('#viewport').setAttribute('transform',`translate(${pan.x} ${pan.y}) scale(${scale})`)}function zoom(f){scale=Math.max(.55,Math.min(2.2,scale*f));applyTransform()}function center(){scale=1;pan={x:0,y:0};applyTransform()}function populate(){const areas=[...new Set(nodes.map(n=>n.area))].sort();$('#area').innerHTML='<option value="all">All areas</option>'+areas.map(a=>`<option>${esc(a)}</option>`).join('');draw();applyTransform()}function copyNode(id){navigator.clipboard?.writeText(id);const t=$('#toast');t.textContent='Copied '+id;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}
$('#graph').addEventListener('pointerdown',e=>{drag=true;moved=false;last={x:e.clientX,y:e.clientY};$('#graph').classList.add('grabbing')});window.addEventListener('pointermove',e=>{if(!drag)return;let dx=e.clientX-last.x,dy=e.clientY-last.y;if(Math.abs(dx)+Math.abs(dy)>3)moved=true;pan.x+=dx;pan.y+=dy;last={x:e.clientX,y:e.clientY};applyTransform()});window.addEventListener('pointerup',()=>{drag=false;$('#graph').classList.remove('grabbing')});$('#graph').addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1.1:.9)},{passive:false});$('#zoomIn').onclick=$('#zoomInMini').onclick=()=>zoom(1.15);$('#zoomOut').onclick=$('#zoomOutMini').onclick=()=>zoom(.87);$('#home').onclick=$('#resetView').onclick=center;$('#search').oninput=draw;$('#area').onchange=draw;$('#sheetToggle').onclick=toggleSheet;window.copyNode=copyNode;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('#install').classList.remove('hidden')});$('#install').onclick=()=>deferred&&deferred.prompt();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});populate();
</script>
</body>
</html>
