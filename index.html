<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#061528" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/icon.svg" />
  <title>ZOZ External Brain</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020610;color:#eaf6ff;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif}button,input,select,textarea{font:inherit}body{background:radial-gradient(circle at 50% 5%,#11305b 0,#061224 34%,#020610 72%)}
    .app{min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:0}.stage{padding:18px 18px 28px;position:relative;overflow:hidden}.stage:before{content:"";position:absolute;inset:0;background-image:radial-gradient(#4ad8ff55 1px,transparent 1px);background-size:34px 34px;opacity:.14;pointer-events:none}.top{position:relative;z-index:3;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.kicker{font-size:12px;color:#7dd7ff;letter-spacing:.22em;text-transform:uppercase;font-weight:800}.title{font-size:clamp(30px,6vw,64px);line-height:.92;margin:6px 0 8px;text-shadow:0 0 30px #45cfff88}.subtitle{color:#a8c2d7;max-width:720px}.install{border:1px solid #3b9bd4;background:#07182d;color:#eaf8ff;border-radius:18px;padding:13px 18px;font-weight:900;box-shadow:0 0 24px #1ecbff22}.hidden{display:none!important}.toolbar{position:relative;z-index:3;display:grid;grid-template-columns:minmax(0,1fr) 190px 130px;gap:10px;margin:12px 0}.toolbar input,.toolbar select,.drawer input,.drawer select,.drawer textarea{width:100%;border:1px solid #265d85;background:#071223;color:#eaf8ff;border-radius:16px;padding:13px 14px;outline:none}.ghost{border:1px solid #2f7dab;background:#07182d;color:#d8f3ff;border-radius:16px;font-weight:850;padding:12px 14px}.mapShell{position:relative;z-index:2;height:calc(100vh - 176px);min-height:610px;border:1px solid #19476d;border-radius:28px;background:linear-gradient(180deg,#061528cc,#020713ee);box-shadow:inset 0 0 90px #00b7ff10,0 0 40px #001a3f;overflow:hidden}.mapShell:after{content:"";position:absolute;inset:-20%;background:radial-gradient(circle at 50% 45%,#27d8ff10,transparent 36%),radial-gradient(circle at 74% 30%,#ffb84d12,transparent 18%),radial-gradient(circle at 26% 64%,#3fffc012,transparent 18%);pointer-events:none}.map{width:100%;height:100%;display:block;position:relative;z-index:1;touch-action:pan-x pan-y}.link{stroke:url(#linkGrad);stroke-width:1.4;opacity:.52;fill:none}.link.strong{stroke-width:2.8;opacity:.9}.link.faint{opacity:.24}.pulse{stroke:#66e7ff;stroke-width:1.1;opacity:.34;stroke-dasharray:5 9;animation:dash 12s linear infinite}@keyframes dash{to{stroke-dashoffset:-220}}.brainGlow{filter:drop-shadow(0 0 22px #36d8ff) drop-shadow(0 0 54px #168cff)}.brainText{fill:#eaf8ff;font-weight:900;text-anchor:middle}.brainSmall{fill:#a7d8f6;font-size:16px;text-anchor:middle}.node{cursor:pointer}.node rect,.node circle{filter:drop-shadow(0 0 12px #2ed8ff55)}.node .ring{fill:#081c34cc;stroke-width:2.2}.node text{fill:#eaf6ff;font-weight:800;text-anchor:middle;dominant-baseline:middle;pointer-events:none}.node .idText{fill:#83e8ff;font-size:13px;letter-spacing:.06em}.node .label{font-size:16px}.node .sub{fill:#bad1e3;font-size:12px;font-weight:650}.node.active .ring{stroke:#fff;stroke-width:4}.clusterLabel{fill:#dff8ff;font-size:18px;font-weight:900;text-anchor:middle;letter-spacing:.02em}.clusterSub{fill:#88abc2;font-size:12px;text-anchor:middle}.orbit{fill:none;stroke:#2dd7ff22;stroke-width:1}.drawer{background:linear-gradient(180deg,#071222,#030916);border-left:1px solid #1c4668;min-height:100vh;padding:18px 16px;display:flex;flex-direction:column;gap:14px;position:relative;z-index:5}.drawerCard{border:1px solid #214e73;border-radius:24px;background:linear-gradient(180deg,#0a1a31,#05101f);padding:18px;box-shadow:0 0 32px #001c42}.drawer h2{margin:6px 0 10px;font-size:28px;line-height:1}.drawer h3{margin:0 0 10px}.pill{display:inline-block;margin:4px 6px 4px 0;border:1px solid #2d6f9d;border-radius:999px;padding:5px 9px;color:#bff0ff;background:#071a2d;font-size:12px;font-weight:800}.muted{color:#91aabd}.detailGrid{display:grid;gap:10px}.kv{border-top:1px solid #173b59;padding-top:10px}.kv b{display:block;color:#7ddfff;font-size:12px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.tab{border:1px solid #285f85;background:#07182d;color:#dff6ff;border-radius:14px;padding:11px;font-weight:900}.tab.active{background:linear-gradient(135deg,#0d3764,#115c42);border-color:#52d8ff}.panel{display:none}.panel.active{display:block}.nodeList{display:grid;gap:8px;max-height:34vh;overflow:auto;padding-right:4px}.nodeItem{border:1px solid #1f4e72;border-radius:14px;background:#061427;padding:10px;cursor:pointer}.nodeItem b{display:block}.nodeItem small{color:#75dcff;font-weight:900}.form{display:grid;gap:10px}.form label{display:grid;gap:5px;color:#cbe7f7;font-weight:800}.primary{border:1px solid #4ae2ff;background:linear-gradient(135deg,#0e4479,#0f6445);color:#effcff;border-radius:15px;padding:12px;font-weight:950}.status{font-size:12px;color:#789ab2;margin-top:auto}.legend{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.legend div{font-size:12px;color:#b4d2e5}.dot{display:inline-block;width:10px;height:10px;border-radius:99px;margin-right:6px;box-shadow:0 0 12px currentColor}.miniBrain{display:none}.mobileDetails{display:none}
    @media(max-width:920px){.app{display:block}.stage{padding:14px 12px 22px}.top{align-items:center}.subtitle{display:none}.toolbar{grid-template-columns:1fr 112px}.toolbar select{grid-column:1/2}.toolbar .ghost{grid-column:2/3;grid-row:2/3}.mapShell{height:68vh;min-height:540px;border-radius:24px}.drawer{display:none}.mobileDetails{display:block;position:relative;z-index:6;margin:12px 0}.title{font-size:38px}.install{padding:11px 14px}.map{min-width:900px}.mapShell{overflow:auto}.miniBrain{display:block}}
  </style>
</head>
<body>
<div class="app">
  <main class="stage">
    <div class="top">
      <div><div class="kicker">OlegGPT Control Map</div><div class="title">ZOZ External Brain</div><div class="subtitle">Живая карта структуры: центр, домены, источники, уверенность и следующие действия. Узлы не должны налезать друг на друга.</div></div>
      <button id="install" class="install hidden">Install</button>
    </div>
    <div class="toolbar">
      <input id="search" placeholder="Поиск по узлам: invoice, FD QA, Record Watch, Bootstrap…" />
      <select id="filter"><option value="all">All areas</option></select>
      <button id="reset" class="ghost">Reset local</button>
    </div>
    <section id="mobileDetails" class="mobileDetails drawerCard"></section>
    <section class="mapShell" aria-label="ZOZ External Brain map">
      <svg id="svg" class="map" viewBox="0 0 1500 900" role="img" aria-label="Interactive External Brain visual map">
        <defs>
          <linearGradient id="linkGrad" x1="0" x2="1"><stop offset="0" stop-color="#48dfff"/><stop offset=".5" stop-color="#9f7cff"/><stop offset="1" stop-color="#ffb84d"/></linearGradient>
          <radialGradient id="brainGrad" cx="50%" cy="42%" r="70%"><stop offset="0" stop-color="#9ff8ff" stop-opacity=".95"/><stop offset=".38" stop-color="#1b91ff" stop-opacity=".9"/><stop offset="1" stop-color="#09325a" stop-opacity=".94"/></radialGradient>
          <filter id="soft"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
        <g id="links"></g>
        <g id="orbits"></g>
        <g id="nodes"></g>
      </svg>
    </section>
  </main>
  <aside class="drawer">
    <div class="drawerCard">
      <div class="kicker">Selected Node</div>
      <div id="details"></div>
    </div>
    <div class="tabs"><button class="tab active" data-panel="list">Nodes</button><button class="tab" data-panel="add">Add</button><button class="tab" data-panel="legend">Legend</button></div>
    <section id="list" class="panel active drawerCard"><h3>Nodes</h3><div id="nodeList" class="nodeList"></div></section>
    <section id="add" class="panel drawerCard"><h3>Add local branch</h3><form id="form" class="form"><label>Node ID<input name="id" placeholder="ZOZ-APP-0002" required></label><label>Title<input name="title" required></label><label>Parent<select id="parent" name="parent"></select></label><label>Area<input name="area" placeholder="AI Automation"></label><label>Status<input name="status" placeholder="Idea / Active / Watch"></label><label>Source<input name="source" placeholder="Oleg command"></label><label>Confidence<input name="confidence" placeholder="USER_CONFIRMED"></label><label>Next Action<textarea name="next" rows="3"></textarea></label><button class="primary" type="submit">Create branch</button></form></section>
    <section id="legend" class="panel drawerCard"><h3>Legend</h3><div class="legend"><div><span class="dot" style="color:#58dfff;background:#58dfff"></span>System</div><div><span class="dot" style="color:#ffb84d;background:#ffb84d"></span>Fire QA</div><div><span class="dot" style="color:#bd7cff;background:#bd7cff"></span>AI</div><div><span class="dot" style="color:#61ffc0;background:#61ffc0"></span>Product</div></div><p class="muted">No reliable source = no confirmed finding.</p></section>
    <div class="status" id="status"></div>
  </aside>
</div>
<script>
const baseNodes=[
{id:'CORE',title:'ZOZ External Brain',type:'Core',area:'Core',status:'Active',source:'Visual map',confidence:'CONFIRMED_SOURCE',next:'Open Bootstrap, then Live Index, then relevant node.',x:750,y:420,w:310,h:170,core:true},
{id:'ZOZ-SYS-0002',title:'System Rules',type:'Cluster',area:'System',status:'Active',source:'Bootstrap',confidence:'CONFIRMED_SOURCE',next:'Keep hard rules and operating logic here.',parent:'CORE',x:460,y:190,w:150,h:96,color:'#58dfff'},
{id:'ZOZ-SYS-0003',title:'Live Memory Index',type:'Index',area:'System',status:'Active',source:'Google Sheet',confidence:'CONFIRMED_SOURCE',next:'Use for routing nodes, links, sources, actions.',parent:'CORE',x:540,y:665,w:170,h:96,color:'#58dfff'},
{id:'ZOZ-FD-0001',title:'Fire Door / QA',type:'Cluster',area:'Fire Door QA',status:'Active',source:'Oleg project context',confidence:'USER_CONFIRMED',next:'FD QA Engine stays as protected expert logic.',parent:'CORE',x:980,y:195,w:155,h:96,color:'#ffb84d'},
{id:'ZOZ-FD-PRODUCT-0001',title:'QA Product Architecture',type:'Product',area:'Fire Door QA',status:'Build Candidate',source:'Oleg command',confidence:'USER_CONFIRMED',next:'Map mobile commands and safety levels.',parent:'ZOZ-FD-0001',x:1135,y:350,w:175,h:96,color:'#ffb84d'},
{id:'ZOZ-AI-AGENTS-0004',title:'AI Agents Automation',type:'Cluster',area:'AI Automation',status:'Active Watch',source:'OpenClaw / mobile agent idea',confidence:'TIME_SENSITIVE',next:'Define mobile command templates.',parent:'CORE',x:1120,y:610,w:170,h:96,color:'#bd7cff'},
{id:'ZOZ-DT-0001',title:'Digital Expert Twin',type:'Future Product',area:'Product',status:'Planned',source:'Oleg idea',confidence:'USER_CONFIRMED',next:'Use training cases as future knowledge layer.',parent:'CORE',x:260,y:420,w:170,h:96,color:'#61ffc0'},
{id:'ZOZ-INBOX-0001',title:'Capture Queue',type:'Queue',area:'System',status:'Active',source:'Auto Intake Router',confidence:'USER_CONFIRMED',next:'Hold useful but unclear captures.',parent:'ZOZ-SYS-0013',x:255,y:650,w:170,h:92,color:'#58dfff'},
{id:'ZOZ-SYS-0013',title:'Auto Intake Router',type:'Router',area:'System',status:'Active',source:'Oleg explicit request',confidence:'USER_CONFIRMED',next:'Route useful info into node or queue.',parent:'CORE',x:335,y:305,w:170,h:92,color:'#58dfff'},
{id:'ZOZ-SYS-0015',title:'Operating Registers',type:'Register',area:'System',status:'Active',source:'External Brain rule',confidence:'USER_CONFIRMED',next:'Use for domains, decisions, cases, sources.',parent:'ZOZ-SYS-0003',x:725,y:735,w:180,h:92,color:'#58dfff'},
{id:'ZOZ-FD-SKILLS-0002',title:'FD QA Skills Spec',type:'Spec',area:'Fire Door QA',status:'Draft',source:'Build spec',confidence:'USER_CONFIRMED',next:'Test P0 skills on known FD QA case.',parent:'ZOZ-FD-PRODUCT-0001',x:1245,y:170,w:165,h:90,color:'#ffb84d'},
{id:'ZOZ-SYS-0012',title:'Proactive Capture Rule',type:'Rule',area:'System',status:'Active',source:'Oleg challenge',confidence:'USER_CONFIRMED',next:'Suggest capture for reusable value.',parent:'ZOZ-SYS-0013',x:405,y:545,w:170,h:92,color:'#58dfff'}
];
const clusters={System:{x:420,y:360,color:'#58dfff'},'Fire Door QA':{x:1110,y:260,color:'#ffb84d'},'AI Automation':{x:1120,y:610,color:'#bd7cff'},Product:{x:260,y:420,color:'#61ffc0'},Core:{x:750,y:420,color:'#58dfff'}};
let local=JSON.parse(localStorage.zoz_brain_local_nodes_v2||'[]');let nodes=[...baseNodes,...layoutLocal(local)];let selected=nodes[0];let deferred=null;const $=s=>document.querySelector(s);const svgNS='http://www.w3.org/2000/svg';
function layoutLocal(arr){return arr.map((n,i)=>{let p=baseNodes.find(x=>x.id===n.parent)||baseNodes[0],ang=(i*0.9)+0.5,r=150+((i%3)*44);return {...n,x:Math.max(90,Math.min(1410,p.x+Math.cos(ang)*r)),y:Math.max(90,Math.min(810,p.y+Math.sin(ang)*r)),w:165,h:88,color:(clusters[n.area]?.color||'#58dfff')}})}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function visible(){let q=$('#search').value.toLowerCase(),f=$('#filter').value;return nodes.filter(n=>(f==='all'||n.area===f||n.id==='CORE')&&[n.id,n.title,n.area,n.status,n.type].join(' ').toLowerCase().includes(q)||n.id==='CORE')}
function svgEl(tag,attrs={}){let e=document.createElementNS(svgNS,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e}
function draw(){let v=visible(),ids=new Set(v.map(n=>n.id));$('#links').innerHTML='';$('#orbits').innerHTML='';$('#nodes').innerHTML='';Object.values(clusters).forEach(c=>{if(c.x!==750){$('#orbits').append(svgEl('circle',{class:'orbit',cx:c.x,cy:c.y,r:170}))}});v.forEach(n=>{if(n.parent&&ids.has(n.parent)){let p=nodes.find(x=>x.id===n.parent);let path=`M${p.x},${p.y} C${(p.x+n.x)/2},${p.y} ${(p.x+n.x)/2},${n.y} ${n.x},${n.y}`;$('#links').append(svgEl('path',{class:'link '+(p.id==='CORE'?'strong':''),d:path}));$('#links').append(svgEl('path',{class:'pulse',d:path}))}});v.forEach(n=>$('#nodes').append(drawNode(n)));renderList();renderDetails()}
function drawNode(n){let g=svgEl('g',{class:'node '+(selected.id===n.id?'active':''),transform:`translate(${n.x} ${n.y})`});g.addEventListener('click',()=>{selected=n;draw()});if(n.core){let blob=svgEl('path',{class:'brainGlow',d:'M-145,-15 C-145,-90 -60,-126 -18,-91 C20,-142 120,-104 130,-32 C188,8 137,97 64,80 C22,130 -86,108 -82,54 C-126,56 -166,26 -145,-15',fill:'url(#brainGrad)',stroke:'#67e9ff','stroke-width':'4',opacity:'.96'});g.append(blob);g.append(svgEl('text',{class:'brainText',x:0,y:-22,'font-size':30})).textContent='ZOZ External Brain';g.append(svgEl('text',{class:'brainSmall',x:0,y:18})).textContent='Bootstrap · Nodes · Links · Source · Actions';return g}let color=n.color||clusters[n.area]?.color||'#58dfff';g.append(svgEl('rect',{class:'ring',x:-n.w/2,y:-n.h/2,width:n.w,height:n.h,rx:24,stroke:color,fill:'#071a31dd'}));g.append(svgEl('text',{class:'idText',x:0,y:-22})).textContent=n.id.length>18?n.id.slice(0,18)+'…':n.id;let words=n.title.split(' '),line1=words.slice(0,3).join(' '),line2=words.slice(3,7).join(' ');g.append(svgEl('text',{class:'label',x:0,y:3})).textContent=line1;g.append(svgEl('text',{class:'sub',x:0,y:25})).textContent=line2||n.type;return g}
function renderDetails(){let html=`<div class="muted">${esc(selected.id)}</div><h2>${esc(selected.title)}</h2><span class="pill">${esc(selected.area)}</span><span class="pill">${esc(selected.status)}</span><div class="detailGrid"><div class="kv"><b>Type</b>${esc(selected.type)}</div><div class="kv"><b>Source</b>${esc(selected.source)}</div><div class="kv"><b>Confidence</b>${esc(selected.confidence)}</div><div class="kv"><b>Next Action</b>${esc(selected.next)}</div><div class="kv"><b>Parent</b>${esc(selected.parent||'none')}</div></div>`;$('#details').innerHTML=html;$('#mobileDetails').innerHTML=html}
function renderList(){let q=$('#search').value.toLowerCase();let items=nodes.filter(n=>n.id!=='CORE'&&[n.id,n.title,n.area].join(' ').toLowerCase().includes(q)).map(n=>`<div class="nodeItem" data-id="${esc(n.id)}"><small>${esc(n.id)}</small><b>${esc(n.title)}</b><span class="muted">${esc(n.area)} · ${esc(n.status)}</span></div>`).join('');$('#nodeList').innerHTML=items;document.querySelectorAll('.nodeItem').forEach(e=>e.onclick=()=>{selected=nodes.find(n=>n.id===e.dataset.id);draw()})}
function init(){let areas=[...new Set(nodes.map(n=>n.area).filter(Boolean))].sort();$('#filter').innerHTML='<option value="all">All areas</option>'+areas.map(a=>`<option>${esc(a)}</option>`).join('');$('#parent').innerHTML=nodes.map(n=>`<option value="${esc(n.id)}">${esc(n.id)} — ${esc(n.title)}</option>`).join('');$('#status').textContent=`V2 brain map · ${nodes.length} nodes · local branches saved on this device`;draw()}
$('#search').oninput=draw;$('#filter').onchange=draw;$('#reset').onclick=()=>{localStorage.removeItem('zoz_brain_local_nodes_v2');local=[];nodes=[...baseNodes];selected=nodes[0];init()};document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#'+b.dataset.panel).classList.add('active')});$('#form').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target),n={id:f.get('id'),title:f.get('title'),parent:f.get('parent'),type:'Local',area:f.get('area')||'System',status:f.get('status')||'Active',source:f.get('source')||'Local phone input',confidence:f.get('confidence')||'USER_INPUT',next:f.get('next')||'Manual review'};local=local.filter(x=>x.id!==n.id);local.push(n);localStorage.zoz_brain_local_nodes_v2=JSON.stringify(local);nodes=[...baseNodes,...layoutLocal(local)];selected=nodes.find(x=>x.id===n.id);e.target.reset();init()};window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('#install').classList.remove('hidden')});$('#install').onclick=()=>deferred&&deferred.prompt();if('serviceWorker'in navigator)navigator.serviceWorker.register('./service-worker.js').catch(()=>{});init();
</script>
</body>
</html>
