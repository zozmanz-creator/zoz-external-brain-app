<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Бассейны Кишинёва и рядом</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>html,body{margin:0;height:100%;font-family:Arial,sans-serif;color:#17324a}.app{height:100%;display:grid;grid-template-columns:390px 1fr}.side{overflow:auto;background:#fff;border-right:1px solid #d9e3e8}.head{padding:16px;background:linear-gradient(135deg,#effcf9,#fff4e8);position:sticky;top:0;z-index:3}.head h1{margin:0 0 6px;font-size:23px}.head p{margin:0 0 10px;font-size:13px;color:#587080}.search{width:100%;box-sizing:border-box;padding:10px;border:1px solid #c9d6dc;border-radius:9px}.filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}.filters button{border:1px solid #d3dde2;background:#fff;border-radius:18px;padding:7px 10px;font-weight:700;cursor:pointer}.filters button.active{background:#17324a;color:#fff}.status{font-size:12px;margin-top:8px;color:#587080}.list{padding:10px}.card{border:1px solid #dce5e9;border-radius:12px;padding:11px;margin-bottom:9px;box-shadow:0 2px 7px rgba(0,0,0,.04)}.card h3{margin:0 0 5px;font-size:15px}.addr,.note{font-size:12px;color:#5c707c;line-height:1.35}.price{font-weight:800;font-size:13px;margin:7px 0}.links a{display:inline-block;margin:5px 5px 0 0;padding:5px 8px;border-radius:7px;background:#edf7f7;color:#08777b;text-decoration:none;font-size:12px;font-weight:700}.links a.src{background:#f1edfb;color:#6237b4}#map{height:100%}.pin{width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 7px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center}.pin span{transform:rotate(45deg);color:#fff;font-size:11px;font-weight:900}.city{background:#078b8c}.near{background:#e56b13}.sport{background:#6941c6}.both{background:#166f9b}@media(max-width:760px){.app{display:flex;flex-direction:column}.side{order:2;border-right:0}.head{position:static}#map{height:56vh;min-height:380px}}</style></head><body><div class="app"><aside class="side"><div class="head"><h1>Бассейны Кишинёва и рядом</h1><p>37 мест: летние бассейны, курорты рядом и спортивные комплексы. Цены — ориентиры сезона 2026.</p><input id="q" class="search" placeholder="Поиск по названию, адресу или цене"><div class="filters"><button class="active" data-f="all">Все</button><button data-f="summer-city">В городе</button><button data-f="summer-near">Рядом</button><button data-f="sport-city">Спортивные</button></div><div id="status" class="status">Загрузка данных…</div></div><div id="list" class="list"></div></aside><main id="map"></main></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script><script>const map=L.map('map').setView([47.02,28.84],10);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);let rows=[],filter='all',term='',markers=new Map();const cache=JSON.parse(localStorage.getItem('chisinauPoolsGeocode')||'{}');const fallback={'Chișinău':[47.0105,28.8638],'Stăuceni':[47.0967,28.8678],'Vatra':[47.074,28.735],'Cricova':[47.138,28.861],'Merenii Noi':[46.917,29.107],'Todirești':[46.861,29.227],'Roșcani':[46.898,29.159],'Vadul lui Vodă':[47.091,29.075],'Puhoi':[46.899,28.771],'Cărbuna':[46.756,28.957],'Cojușna':[47.094,28.657],'Hrușova':[47.185,29.046],'Durlești':[47.016,28.757]};function ok(v){const f=filter==='all'||v.category===filter||(v.category==='both'&&(filter==='summer-near'||filter==='sport-city'));return f&&(v.name+' '+v.address+' '+v.price+' '+v.note).toLowerCase().includes(term)}function maps(v){return'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(v.query)}function pclass(c){return c==='summer-city'?'city':c==='summer-near'?'near':c==='sport-city'?'sport':'both'}function icon(v){return L.divIcon({className:'',html:`<div class="pin ${pclass(v.category)}"><span>${v.id}</span></div>`,iconSize:[30,30],iconAnchor:[15,28]})}function popup(v){return`<b>${v.name}</b><br>📍 ${v.address}<br><b>💰 ${v.price}</b><br>${v.note}<br><small>Точность: ${v.confidence}</small><br><a target="_blank" href="${v.page}">Страница</a> · <a target="_blank" href="${maps(v)}">Google Maps</a> · <a target="_blank" href="${v.source}">Источник</a>`}function render(){document.getElementById('list').innerHTML=rows.filter(ok).map(v=>`<div class="card"><h3>${v.id}. ${v.name}</h3><div class="addr">${v.address}</div><div class="price">💰 ${v.price}</div><div class="note">${v.note}</div><div class="links"><a target="_blank" href="${v.page}">Страница</a><a target="_blank" href="${maps(v)}">Google Maps</a><a class="src" target="_blank" href="${v.source}">${v.source_label}</a></div></div>`).join('');markers.forEach((m,id)=>{const v=rows.find(x=>x.id==id);if(ok(v)){if(!map.hasLayer(m))m.addTo(map)}else if(map.hasLayer(m))map.removeLayer(m)})}async function geo(v){if(cache[v.id])return cache[v.id];try{const r=await fetch('https://photon.komoot.io/api/?limit=1&q='+encodeURIComponent(v.query));const j=await r.json();if(j.features?.length){const [lon,lat]=j.features[0].geometry.coordinates;if(lat>45&&lat<50&&lon>26&&lon<31){cache[v.id]=[lat,lon];localStorage.setItem('chisinauPoolsGeocode',JSON.stringify(cache));return cache[v.id]}}}catch(e){}for(const k in fallback)if(v.address.includes(k)||v.query.includes(k))return fallback[k];return[47.0105,28.8638]}async function place(){let done=0,b=[];for(const v of rows){const ll=await geo(v),m=L.marker(ll,{icon:icon(v)}).bindPopup(popup(v));markers.set(v.id,m);m.addTo(map);b.push(ll);done++;document.getElementById('status').textContent=`Поставлено точек: ${done} из ${rows.length}`;await new Promise(r=>setTimeout(r,140))}map.fitBounds(b,{padding:[20,20],maxZoom:11});document.getElementById('status').textContent=`Готово: ${rows.length} мест. Нажми на маркер или ссылку.`}document.querySelectorAll('.filters button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.filters button').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.f;render()});document.getElementById('q').oninput=e=>{term=e.target.value.toLowerCase().trim();render()};Papa.parse('https://raw.githubusercontent.com/zozmanz-creator/zoz-external-brain-app/gh-pages/chisinau-pools/data.csv',{download:true,header:true,skipEmptyLines:true,complete:r=>{rows=r.data;render();place()},error:e=>document.getElementById('status').textContent='Ошибка загрузки данных: '+e});</script></body></html>
