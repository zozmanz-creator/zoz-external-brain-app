let selected='CORE',cy,deferred;const $=s=>document.querySelector(s);function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function byId(id){return N.find(n=>n.id===id)}

function renderSheet(){const n=byId(selected);const links=(n.links||[]).map(([label,url])=>`<a class="linkBtn" href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>`).join('');$('#content').innerHTML=`<h2>${esc(n.title)}</h2><span class="pill">${esc(n.id)}</span><span class="pill">${esc(n.area)}</span><span class="pill">${esc(n.status)}</span><div class="kv"><b>Type</b>${esc(n.type)}</div><div class="kv"><b>Source</b>${esc(n.source)}</div><div class="kv"><b>Confidence</b>${esc(n.confidence)}</div><div class="kv"><b>Next Action</b>${esc(n.next)}</div><div class="kv"><b>Linked files</b><div class="links">${links}<button class="copyBtn" onclick="copyId('${esc(n.id)}')">Copy Node ID</button></div></div>`}
function openSheet(on){$('#sheet').classList.toggle('open',on);$('#toggle').textContent=on?'Hide':'Show'}function populateAreas(){const areas=[...new Set(N.map(n=>n.area))].sort();$('#area').innerHTML='<option value="all">All areas</option>'+areas.map(a=>`<option>${esc(a)}</option>`).join('')}function applyFilter(){const q=$('#search').value.toLowerCase(),area=$('#area').value;cy.nodes().forEach(n=>{const d=n.data();const show=(area==='all'||d.area===area||d.id==='CORE')&&[d.id,d.title,d.area,d.type,d.status].join(' ').toLowerCase().includes(q);n.style('display',show?'element':'none')});cy.edges().forEach(e=>{const show=e.source().style('display')!=='none'&&e.target().style('display')!=='none';e.style('display',show?'element':'none')})}function copyId(id){navigator.clipboard?.writeText(id);$('#toast').textContent='Copied '+id;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),1300)}
$('#search').oninput=applyFilter;$('#area').onchange=applyFilter;$('#plus').onclick=$('#zplus').onclick=()=>cy.zoom({level:cy.zoom()*1.18,renderedPosition:{x:innerWidth/2,y:innerHeight/2}});$('#minus').onclick=$('#zminus').onclick=()=>cy.zoom({level:cy.zoom()*.85,renderedPosition:{x:innerWidth/2,y:innerHeight/2}});$('#center').onclick=$('#home').onclick=()=>{cy.animate({zoom:.85,center:{eles:cy.$('#CORE')}},{duration:250})};$('#toggle').onclick=()=>openSheet(!$('#sheet').classList.contains('open'));window.copyId=copyId;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('#install').hidden=false});$('#install').onclick=()=>deferred&&deferred.prompt();init();
